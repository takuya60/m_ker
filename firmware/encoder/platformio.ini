; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:ATtiny1616]
platform = atmelmegaavr
board = ATtiny1616
framework = arduino
board_build.mcu = attiny1616
board_build.f_cpu = 20000000L

; --- ATtiny1616 fuse bit settings ---
; Correct fuses are applied every time PlatformIO writes (no Arduino IDE needed)
board_fuses.WDTCFG  = 0x00   ; [FUSE0] Watchdog disabled
board_fuses.BODCFG  = 0x00   ; [FUSE1] BOD (Brown-out detection) disabled
board_fuses.OSCCFG  = 0x02   ; [FUSE2] 20MHz internal oscillator (changed from factory default 0x01=16MHz)
board_fuses.SYSCFG0 = 0xC4   ; [FUSE4] CRC disabled(0b11), PA0=UPDI kept(0b01), EEPROM erase enabled(0)
                              ;         NOTE: setting 0xC8(RSTPINCFG=Reset) disables UPDI re-programming
board_fuses.SYSCFG1 = 0x06   ; [FUSE5] Startup delay 8ms (wait for power to stabilize)
board_fuses.APPEND  = 0x00   ; [FUSE6] No application section restriction
board_fuses.BOOTEND = 0x00   ; [FUSE7] No boot section

upload_protocol = serialupdi
upload_port = COM14
upload_speed = 57600
build_flags = -DDEVICE_ID=6
; lib_deps =
;     simplefoc/SimpleFOCDrivers@^1.0.9
