; PlatformIO Project Configuration File
;
; Switch transport: select environment in VS Code PlatformIO toolbar (bottom bar)
;   "usb"    — USB-OTG vendor class  (default)
;   "serial" — UART via USB-CDC / physical serial
;
; CLI:
;   pio run -e usb    --target upload
;   pio run -e serial --target upload

[platformio]
default_envs = usb

[env]
platform  = espressif32
board     = m5stack-cores3
framework = arduino
lib_deps  =
    m5stack/M5Unified@^0.2.11
    https://github.com/m5stack/M5Unit-Joystick2.git
    https://github.com/m5stack/M5Unit-Scroll.git

[env:usb]
build_flags =
    -D USE_USB
    -D CONFIG_TINYUSB_VENDOR_ENABLED=1

[env:serial]
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
